<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de control — Switchboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --ok: #22c55e; --err: #ef4444; --brand: #3b82f6; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1.5rem; line-height: 1.5; }
        h1 { font-size: 1.5rem; margin: 0 0 1.5rem; color: var(--text); }
        section { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem 1.25rem; margin-bottom: 1rem; }
        section h2 { font-size: 0.875rem; font-weight: 600; color: var(--muted); margin: 0 0 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-weight: 500; }
        .status-ok { color: var(--ok); }
        .status-err { color: var(--err); }
        .status-unknown { color: var(--muted); }
        button, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.75rem; border-radius: 0.5rem; font-size: 0.8125rem; cursor: pointer; }
        button:hover, select:hover { border-color: var(--brand); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .promote-cell { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .refresh { margin-bottom: 1rem; }
        .refresh button { background: var(--brand); border-color: var(--brand); color: #fff; }
        .error-msg { color: var(--err); font-size: 0.875rem; margin-top: 0.5rem; }
        .muted { color: var(--muted); }
    </style>
</head>
<body>
    <h1>Centro de control — Switchboard</h1>
    <div class="refresh"><button type="button" id="btnRefresh">Actualizar todo</button></div>

    <section id="section-status">
        <h2>Estado de deployments</h2>
        <div id="status-content">Cargando…</div>
    </section>

    <section id="section-accounts">
        <h2>Accounts</h2>
        <div id="accounts-content">Cargando…</div>
    </section>

    <section id="section-agents">
        <h2>Agents</h2>
        <div id="agents-content">Cargando…</div>
    </section>

    <section id="section-deployments">
        <h2>Deployments</h2>
        <div id="deployments-content">Cargando…</div>
    </section>

    <section id="section-assignments">
        <h2>Assignments (promoción)</h2>
        <div id="assignments-content">Cargando…</div>
    </section>

    <script>
        const API_BASE = window.location.origin;

        async function api(path) {
            const r = await fetch(API_BASE + path);
            if (!r.ok) throw new Error(r.status + " " + r.statusText);
            return r.json();
        }

        async function apiPatch(path, body) {
            const r = await fetch(API_BASE + path, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            });
            if (!r.ok) throw new Error(r.status + " " + r.statusText);
            return r.json();
        }

        function renderStatus(data) {
            const deployments = data.deployments || [];
            if (deployments.length === 0) {
                document.getElementById("status-content").innerHTML = "<p class=\"muted\">No hay deployments.</p>";
                return;
            }
            const rows = deployments.map((d) => {
                const cls = d.ok ? "status-ok" : "status-err";
                const label = d.ok ? "Activo" : "Degradado";
                const extra = d.latencyMs != null ? " (" + d.latencyMs + " ms)" : (d.error ? " (" + d.error + ")" : "");
                return "<tr><td>" + escapeHtml(d.deploymentId) + "</td><td class=\"font-mono text-sm\">" + escapeHtml(d.baseUrl) + "</td><td class=\"" + cls + "\">" + escapeHtml(label) + extra + "</td></tr>";
            }).join("");
            document.getElementById("status-content").innerHTML = "<table><thead><tr><th>Deployment</th><th>Base URL</th><th>Estado</th></tr></thead><tbody>" + rows + "</tbody></table>";
        }

        function escapeHtml(s) {
            if (s == null) return "";
            const t = document.createElement("textarea");
            t.textContent = s;
            return t.innerHTML;
        }

        function renderAccounts(list) {
            if (!list || list.length === 0) {
                document.getElementById("accounts-content").innerHTML = "<p class=\"muted\">No hay accounts.</p>";
                return;
            }
            const rows = list.map((a) => "<tr><td>" + escapeHtml(a.id) + "</td><td>" + escapeHtml(a.name || "—") + "</td><td>" + escapeHtml(a.role || "—") + "</td><td>" + escapeHtml(a.status || "—") + "</td></tr>").join("");
            document.getElementById("accounts-content").innerHTML = "<table><thead><tr><th>ID</th><th>Nombre</th><th>Rol</th><th>Status</th></tr></thead><tbody>" + rows + "</tbody></table>";
        }

        function renderAgents(list) {
            if (!list || list.length === 0) {
                document.getElementById("agents-content").innerHTML = "<p class=\"muted\">No hay agents.</p>";
                return;
            }
            const rows = list.map((a) => "<tr><td>" + escapeHtml(a.id) + "</td><td>" + escapeHtml(a.type) + "</td><td>" + escapeHtml(a.name || "—") + "</td></tr>").join("");
            document.getElementById("agents-content").innerHTML = "<table><thead><tr><th>ID</th><th>Tipo</th><th>Nombre</th></tr></thead><tbody>" + rows + "</tbody></table>";
        }

        function renderDeployments(list) {
            if (!list || list.length === 0) {
                document.getElementById("deployments-content").innerHTML = "<p class=\"muted\">No hay deployments.</p>";
                return;
            }
            const rows = list.map((d) => "<tr><td>" + escapeHtml(d.id) + "</td><td class=\"font-mono text-sm\">" + escapeHtml(d.baseUrl) + "</td><td>" + escapeHtml(d.accountId || "—") + "</td><td>" + escapeHtml((d.agentIds || []).join(", ")) + "</td><td>" + escapeHtml(d.versionTag || "—") + "</td></tr>").join("");
            document.getElementById("deployments-content").innerHTML = "<table><thead><tr><th>ID</th><th>Base URL</th><th>Account</th><th>Agents</th><th>Versión</th></tr></thead><tbody>" + rows + "</tbody></table>";
        }

        let deploymentsList = [];
        let assignmentsList = [];

        function renderAssignments(list) {
            assignmentsList = list || [];
            deploymentsList = window._deploymentsCache || [];
            if (assignmentsList.length === 0) {
                document.getElementById("assignments-content").innerHTML = "<p class=\"muted\">No hay assignments.</p>";
                return;
            }
            const accountDeployments = {};
            deploymentsList.forEach((d) => {
                if (!d.accountId) return;
                if (!accountDeployments[d.accountId]) accountDeployments[d.accountId] = [];
                accountDeployments[d.accountId].push(d);
            });

            const rows = assignmentsList.map((a) => {
                const options = (accountDeployments[a.accountId] || [])
                    .map((d) => "<option value=\"" + escapeHtml(d.id) + "\"" + (d.id === a.deploymentId ? " selected" : "") + ">" + escapeHtml(d.id) + " (" + escapeHtml(d.versionTag || "") + ")</option>")
                    .join("");
                const select = "<select data-account-id=\"" + escapeHtml(a.accountId) + "\" data-agent-id=\"" + escapeHtml(a.agentId) + "\" class=\"promote-select\">" + options + "</select>";
                const btn = "<button type=\"button\" class=\"promote-btn\" data-account-id=\"" + escapeHtml(a.accountId) + "\" data-agent-id=\"" + escapeHtml(a.agentId) + "\">Promover</button>";
                return "<tr><td>" + escapeHtml(a.accountId) + "</td><td>" + escapeHtml(a.agentId) + "</td><td>" + escapeHtml(a.deploymentId) + "</td><td class=\"promote-cell\">" + select + " " + btn + "</td></tr>";
            }).join("");
            document.getElementById("assignments-content").innerHTML = "<table><thead><tr><th>Account</th><th>Agent</th><th>Deployment actual</th><th>Promoción</th></tr></thead><tbody>" + rows + "</tbody></table>";

            document.querySelectorAll(".promote-btn").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const accountId = btn.getAttribute("data-account-id");
                    const agentId = btn.getAttribute("data-agent-id");
                    const row = btn.closest("tr");
                    const select = row.querySelector(".promote-select");
                    const deploymentId = select && select.value;
                    if (!deploymentId || deploymentId === assignmentsList.find((x) => x.accountId === accountId && x.agentId === agentId).deploymentId) return;
                    btn.disabled = true;
                    try {
                        await apiPatch("/api/registry/assignments/" + encodeURIComponent(accountId) + "/" + encodeURIComponent(agentId), { deploymentId });
                        await loadAll();
                    } catch (e) {
                        row.insertAdjacentHTML("beforeend", "<tr><td colspan=\"4\" class=\"error-msg\">" + escapeHtml(e.message) + "</td></tr>");
                    }
                    btn.disabled = false;
                });
            });
        }

        async function loadAll() {
            try {
                const [status, accounts, agents, deployments, assignments] = await Promise.all([
                    api("/api/registry/status"),
                    api("/api/registry/accounts"),
                    api("/api/registry/agents"),
                    api("/api/registry/deployments"),
                    api("/api/registry/assignments"),
                ]);
                window._deploymentsCache = deployments;
                renderStatus(status);
                renderAccounts(accounts);
                renderAgents(agents);
                renderDeployments(deployments);
                renderAssignments(assignments);
            } catch (e) {
                document.getElementById("section-status").querySelector("div").textContent = "Error: " + e.message;
                document.getElementById("accounts-content").textContent = "Error: " + e.message;
                document.getElementById("agents-content").textContent = "Error: " + e.message;
                document.getElementById("deployments-content").textContent = "Error: " + e.message;
                document.getElementById("assignments-content").textContent = "Error: " + e.message;
            }
        }

        document.getElementById("btnRefresh").addEventListener("click", loadAll);
        loadAll();
    </script>
</body>
</html>
