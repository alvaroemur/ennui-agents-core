# ConfigMap with agent configs. From repo root:
#   kubectl create configmap core-config --from-file=agents=agents --dry-run=client -o yaml > k8s/configmap-agents.yaml
# Then kubectl apply -f k8s/configmap-agents.yaml
# Deployment mounts at /app/config/agents so CONFIG_DIR/agents/<id>/config.json is available.
apiVersion: v1
kind: ConfigMap
metadata:
  name: core-config
  labels:
    app: core
data: {}
# Populate with the kubectl create configmap command above.
