# ConfigMap for runtime overrides (optional). From repo root:
#   kubectl create configmap core-config --from-file=agents=agents --dry-run=client -o yaml > k8s/configmap-agents.yaml
# Then kubectl apply -f k8s/configmap-agents.yaml
# Deployment mounts at /app/config/agents so runtime modules (e.g. /app/config/agents/collector/runtime.js) are available.
apiVersion: v1
kind: ConfigMap
metadata:
  name: core-config
  labels:
    app: core
data: {}
# Populate with the kubectl create configmap command above.
