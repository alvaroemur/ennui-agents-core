# Optional: API keys for LLM providers and optional API auth. Copy to secret.yaml, fill values, then:
# kubectl apply -f ennui-agents-core/k8s/secret.yaml
# Do not commit secret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: ennui-agents-secrets
  labels:
    app: ennui-agents-core
type: Opaque
stringData:
  GEMINI_API_KEY: ""
  OPENROUTER_API_KEY: ""
  OPENAI_API_KEY: ""
  # Optional: require X-API-Key or Authorization: Bearer for API requests
  # ENNUI_API_KEY: ""
