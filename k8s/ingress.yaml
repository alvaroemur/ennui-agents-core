# Optional: expose core via Ingress. Adjust host and ingress class for your cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: core
  labels:
    app: core
spec:
  ingressClassName: nginx
  rules:
    - host: agents.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core
                port:
                  number: 80
